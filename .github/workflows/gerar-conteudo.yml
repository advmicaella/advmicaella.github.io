name: Gerar Conteúdo Noturno

on:
  schedule:
    - cron: '0 2 * * *'   # 23h de Brasília = 02h UTC
  workflow_dispatch:        # permite rodar manualmente

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Gerar conteúdo com Claude e salvar no Drive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_DRIVE_PASTA_APROVACAO: ${{ secrets.GOOGLE_DRIVE_PASTA_APROVACAO }}
        run: node scripts/gerar-conteudo.js
